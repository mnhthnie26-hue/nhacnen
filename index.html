<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Phát Nhạc - Giao Diện Spotify</title>
    <style>
        /* Nền tối chuẩn Spotify */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-size: 22px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* Khu vực đầu trang (Player) */
        .player-header {
            background-color: #181818;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #282828;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
        }

        /* Tên bài đang phát sáng màu xanh dương */
        .now-playing {
            font-weight: bold;
            color: #1e88e5; /* Xanh dương chủ đạo */
            font-size: 24px;
            margin-bottom: 25px;
            min-height: 35px;
        }

        /* Nút Phát/Tạm dừng to, màu xanh dương */
        #play-pause-btn {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #play-pause-btn:hover {
            background-color: #1565c0;
            transform: scale(1.02);
        }

        /* Nút Lặp lại / Ngẫu nhiên */
        .extra-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .control-btn {
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 50px;
            border: 1px solid #b3b3b3;
            background-color: transparent;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Trạng thái BẬT của nút */
        .control-btn.active-mode {
            color: #1e88e5;
            border-color: #1e88e5;
            background-color: rgba(30, 136, 229, 0.1);
        }

        /* Thanh tua nhạc */
        .progress-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .time-text {
            font-size: 18px;
            color: #b3b3b3;
            min-width: 55px;
            font-variant-numeric: tabular-nums;
        }

        #progress-bar {
            flex-grow: 1;
            height: 6px;
            border-radius: 5px;
            cursor: pointer;
            accent-color: #1e88e5; /* Thanh chạy màu xanh dương */
            background-color: #4d4d4d;
        }

        /* Danh sách bài hát kiểu dòng ngang (Spotify Style) */
        .playlist {
            list-style-type: none;
            padding: 20px;
            margin: 0;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 5px;
        }

        .song-item:hover {
            background-color: #2a2a2a; /* Sáng lên một chút khi di chuột */
        }

        /* Bài hát đang phát */
        .song-item.active {
            background-color: #282828;
        }

        .song-item.active .song-number,
        .song-item.active .song-title {
            color: #1e88e5; /* Đổi màu chữ thành xanh dương */
        }

        .song-number {
            font-size: 24px;
            font-weight: bold;
            color: #b3b3b3;
            width: 50px;
            text-align: center;
            margin-right: 15px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 18px;
            color: #b3b3b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-header">
            <h1>🎵 Nhạc Làm Nền 🎵</h1>
            
            <div class="now-playing" id="now-playing-text">Sẵn sàng phát nhạc</div>
            
            <button id="play-pause-btn" onclick="togglePlayPause()">▶ PHÁT NHẠC</button>
            
            <div class="extra-controls">
                <button id="repeat-btn" class="control-btn" onclick="toggleRepeat()">🔁 Lặp Lại</button>
                <button id="shuffle-btn" class="control-btn" onclick="toggleShuffle()">🔀 Ngẫu Nhiên</button>
            </div>

            <div class="progress-area">
                <span class="time-text" id="current-time">00:00</span>
                <input type="range" id="progress-bar" value="0" min="0" step="1">
                <span class="time-text" id="total-time">00:00</span>
            </div>

            <audio id="main-audio" style="display: none;"></audio>
        </div>

        <ul class="playlist" id="playlist-container">
            </ul>
    </div>

    <script>
        const songs = [
            { id: 1, title: 'Hành khúc truyền thống CAND - "Chúng ta là chiến sĩ CA"', artist: '(Trọng Bằng) - Hợp xướng Đoàn ca múa nhạc CAND', src: 'bai1.mp3' },
            { id: 2, title: 'Hành khúc Chiến sĩ An Ninh', artist: '(Kar Lam) - Hợp Ca Nam nữ', src: 'bai2.mp3' },
            { id: 3, title: '"Người Công An Thân yêu"', artist: '(Văn Cao) - NSƯT Vũ Thắng Lợi & Tốp Ca', src: 'bai3.mp3' },
            { id: 4, title: 'Liên khúc "Đại Học ANND Tự hào tiến bước"', artist: '', src: 'bai4.mp3' },
            { id: 5, title: '"Bài Ca CAND VN"', artist: '(Phan Quốc Anh) - Nguyễn Hoàng Phương', src: 'bai5.mp3' },
            { id: 6, title: '"Chúng tôi là người chiến sĩ CA VN"', artist: '(Trần Gia Cường) - Tuấn Anh, Hoàng Anh', src: 'bai6.mp3' },
            { id: 7, title: '"Bài Ca chiến sĩ CA"', artist: '(Đỗ Hồng Quân) - Đức Tùng, Mai Chi', src: 'bai7.mp3' }
        ];

        let currentSongIndex = -1;
        let isRepeat = false;
        let isShuffle = false;

        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const nowPlayingText = document.getElementById('now-playing-text');
        const playlistContainer = document.getElementById('playlist-container');
        const repeatBtn = document.getElementById('repeat-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');

        function renderPlaylist() {
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = 'song-item';
                li.id = 'song-item-' + index;
                li.onclick = () => playSong(index);

                let artistHtml = song.artist ? `<div class="song-artist">${song.artist}</div>` : '';

                li.innerHTML = `
                    <div class="song-number">${song.id}</div>
                    <div class="song-info">
                        <div class="song-title">${song.title}</div>
                        ${artistHtml}
                    </div>
                `;
                playlistContainer.appendChild(li);
            });
        }

        function playSong(index) {
            if (currentSongIndex !== -1) {
                document.getElementById('song-item-' + currentSongIndex).classList.remove('active');
            }

            currentSongIndex = index;
            const song = songs[index];
            
            document.getElementById('song-item-' + currentSongIndex).classList.add('active');
            
            audio.src = song.src;
            audio.play();
            
            nowPlayingText.innerText = "🔊 Đang phát: " + song.title;
            playPauseBtn.innerText = "⏸ TẠM DỪNG";
        }

        function togglePlayPause() {
            if (currentSongIndex === -1) {
                playSong(0);
                return;
            }

            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = "⏸ TẠM DỪNG";
            } else {
                audio.pause();
                playPauseBtn.innerText = "▶ PHÁT TIẾP";
            }
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            audio.loop = isRepeat;
            
            if (isRepeat) {
                repeatBtn.classList.add('active-mode');
            } else {
                repeatBtn.classList.remove('active-mode');
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            if (isShuffle) {
                shuffleBtn.classList.add('active-mode');
            } else {
                shuffleBtn.classList.remove('active-mode');
            }
        }

        function playNextSong() {
            let nextIndex;
            if (isShuffle) {
                if (songs.length > 1) {
                    do { nextIndex = Math.floor(Math.random() * songs.length); } 
                    while (nextIndex === currentSongIndex);
                } else { nextIndex = 0; }
            } else {
                nextIndex = currentSongIndex + 1;
                if (nextIndex >= songs.length) nextIndex = 0;
            }
            playSong(nextIndex);
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (min < 10) min = "0" + min;
            if (sec < 10) sec = "0" + sec;
            return `${min}:${sec}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            progressBar.max = audio.duration;
            totalTimeEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            progressBar.value = audio.currentTime;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        progressBar.addEventListener('input', () => {
            audio.currentTime = progressBar.value;
        });

        audio.addEventListener('ended', playNextSong);

        window.onload = renderPlaylist;
    </script>
</body>
</html>
