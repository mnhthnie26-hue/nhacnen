<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Phát Nhạc Của Ngoại</title>
    <style>
        /* Tông màu nền nhẹ nhàng, sang trọng */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #333;
            margin: 0;
            padding: 20px 10px;
            font-size: 22px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Thẻ điều khiển nổi bật (Sticky Card) */
        .player-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: sticky;
            top: 15px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            color: #4a148c;
            font-size: 34px;
            margin: 0 0 15px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .now-playing {
            font-weight: bold;
            color: #e65100;
            font-size: 26px;
            margin-bottom: 25px;
            min-height: 35px;
            background: #fff3e0;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            border: 1px dashed #ffb74d;
        }

        /* Nút Phát/Tạm dừng to, gradient */
        #play-pause-btn {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 8px 20px rgba(67, 160, 71, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        #play-pause-btn:active {
            transform: scale(0.95);
        }

        /* Nút phụ (Lặp lại, Ngẫu nhiên) */
        .extra-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 25px;
            font-size: 20px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            background-color: #fff;
            color: #555;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .control-btn.active-mode {
            background-color: #ede7f6;
            border-color: #673ab7;
            color: #5e35b1;
            box-shadow: 0 4px 10px rgba(103, 58, 183, 0.2);
        }

        /* Thanh tua nhạc tinh tế */
        .progress-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #f5f5f5;
            padding: 15px 20px;
            border-radius: 50px;
        }

        .time-text {
            font-size: 18px;
            font-weight: bold;
            color: #666;
            min-width: 60px;
        }

        #progress-bar {
            flex-grow: 1;
            height: 10px;
            border-radius: 5px;
            cursor: pointer;
            accent-color: #d81b60; /* Màu hồng đậm cho dễ nhìn */
        }

        /* Danh sách bài hát kiểu thẻ (Card list) */
        .playlist {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .song-item {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            margin-bottom: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 8px solid #90caf9;
            display: flex;
            flex-direction: column;
        }

        .song-item:hover {
            transform: translateY(-3px);
            background-color: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .song-item.active {
            background-color: #fff;
            border-left-color: #ff9800;
            border-right: 2px solid #ff9800;
            border-top: 2px solid #ff9800;
            border-bottom: 2px solid #ff9800;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.2);
        }

        .song-number {
            font-weight: 900;
            color: #1976d2;
            margin-bottom: 8px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .song-title {
            font-weight: bold;
            font-size: 28px;
            margin-bottom: 8px;
            color: #222;
        }

        .song-artist {
            font-size: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-card">
            <h1>🎵 Giai Điệu Vượt Thời Gian 🎵</h1>
            
            <div class="now-playing" id="now-playing-text">Vui lòng chọn một bài hát</div>
            
            <button id="play-pause-btn" onclick="togglePlayPause()">▶ BẤM ĐỂ PHÁT</button>
            
            <div class="extra-controls">
                <button id="repeat-btn" class="control-btn" onclick="toggleRepeat()">🔁 Lặp Lại: TẮT</button>
                <button id="shuffle-btn" class="control-btn" onclick="toggleShuffle()">🔀 Ngẫu Nhiên: TẮT</button>
            </div>

            <div class="progress-area">
                <span class="time-text" id="current-time">00:00</span>
                <input type="range" id="progress-bar" value="0" min="0" step="1">
                <span class="time-text" id="total-time">00:00</span>
            </div>

            <audio id="main-audio" style="display: none;"></audio>
        </div>

        <ul class="playlist" id="playlist-container">
            </ul>
    </div>

    <script>
        const songs = [
            { id: 1, title: 'Hành khúc truyền thống CAND - "Chúng ta là chiến sĩ CA"', artist: '(Trọng Bằng) - Hợp xướng Đoàn ca múa nhạc CAND', src: 'bai1.mp3' },
            { id: 2, title: 'Hành khúc Chiến sĩ An Ninh', artist: '(Kar Lam) - Hợp Ca Nam nữ', src: 'bai2.mp3' },
            { id: 3, title: '"Người Công An Thân yêu"', artist: '(Văn Cao) - NSƯT Vũ Thắng Lợi & Tốp Ca', src: 'bai3.mp3' },
            { id: 4, title: 'Liên khúc "Đại Học ANND Tự hào tiến bước"', artist: '', src: 'bai4.mp3' },
            { id: 5, title: '"Bài Ca CAND VN"', artist: '(Phan Quốc Anh) - Nguyễn Hoàng Phương', src: 'bai5.mp3' },
            { id: 6, title: '"Chúng tôi là người chiến sĩ CA VN"', artist: '(Trần Gia Cường) - Tuấn Anh, Hoàng Anh', src: 'bai6.mp3' },
            { id: 7, title: '"Bài Ca chiến sĩ CA"', artist: '(Đỗ Hồng Quân) - Đức Tùng, Mai Chi', src: 'bai7.mp3' }
        ];

        let currentSongIndex = -1;
        let isRepeat = false;
        let isShuffle = false;

        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const nowPlayingText = document.getElementById('now-playing-text');
        const playlistContainer = document.getElementById('playlist-container');
        const repeatBtn = document.getElementById('repeat-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');

        function renderPlaylist() {
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = 'song-item';
                li.id = 'song-item-' + index;
                li.onclick = () => playSong(index);

                let artistHtml = song.artist ? `<div class="song-artist">${song.artist}</div>` : '';

                li.innerHTML = `
                    <div class="song-number">Bài ${song.id}</div>
                    <div class="song-title">${song.title}</div>
                    ${artistHtml}
                `;
                playlistContainer.appendChild(li);
            });
        }

        function playSong(index) {
            if (currentSongIndex !== -1) {
                document.getElementById('song-item-' + currentSongIndex).classList.remove('active');
            }

            currentSongIndex = index;
            const song = songs[index];
            
            document.getElementById('song-item-' + currentSongIndex).classList.add('active');
            
            audio.src = song.src;
            audio.play();
            
            nowPlayingText.innerText = "🔊 Đang phát: Bài " + song.id;
            updatePlayButtonUI(true);
        }

        function togglePlayPause() {
            if (currentSongIndex === -1) {
                playSong(0);
                return;
            }

            if (audio.paused) {
                audio.play();
                updatePlayButtonUI(true);
            } else {
                audio.pause();
                updatePlayButtonUI(false);
            }
        }

        function updatePlayButtonUI(isPlaying) {
            if (isPlaying) {
                playPauseBtn.innerText = "⏸ TẠM DỪNG";
                playPauseBtn.style.background = "linear-gradient(135deg, #e53935, #c62828)";
                playPauseBtn.style.boxShadow = "0 8px 20px rgba(229, 57, 53, 0.4)";
            } else {
                playPauseBtn.innerText = "▶ PHÁT TIẾP";
                playPauseBtn.style.background = "linear-gradient(135deg, #43a047, #2e7d32)";
                playPauseBtn.style.boxShadow = "0 8px 20px rgba(67, 160, 71, 0.4)";
            }
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            audio.loop = isRepeat;
            
            if (isRepeat) {
                repeatBtn.classList.add('active-mode');
                repeatBtn.innerText = "🔁 Lặp Lại: BẬT";
            } else {
                repeatBtn.classList.remove('active-mode');
                repeatBtn.innerText = "🔁 Lặp Lại: TẮT";
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            if (isShuffle) {
                shuffleBtn.classList.add('active-mode');
                shuffleBtn.innerText = "🔀 Ngẫu Nhiên: BẬT";
            } else {
                shuffleBtn.classList.remove('active-mode');
                shuffleBtn.innerText = "🔀 Ngẫu Nhiên: TẮT";
            }
        }

        function playNextSong() {
            let nextIndex;
            if (isShuffle) {
                if (songs.length > 1) {
                    do { nextIndex = Math.floor(Math.random() * songs.length); } 
                    while (nextIndex === currentSongIndex);
                } else { nextIndex = 0; }
            } else {
                nextIndex = currentSongIndex + 1;
                if (nextIndex >= songs.length) nextIndex = 0;
            }
            playSong(nextIndex);
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (min < 10) min = "0" + min;
            if (sec < 10) sec = "0" + sec;
            return `${min}:${sec}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            progressBar.max = audio.duration;
            totalTimeEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            progressBar.value = audio.currentTime;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        progressBar.addEventListener('input', () => {
            audio.currentTime = progressBar.value;
        });

        audio.addEventListener('ended', playNextSong);

        window.onload = renderPlaylist;
    </script>
</body>
</html>
